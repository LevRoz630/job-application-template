name: Compile LaTeX and Deploy CVs

on:
  push:
    branches: [main]
    paths:
      - 'curriculum_vitae/**/*.tex'
      - 'curriculum_vitae/**/*.cls'
      - '.github/workflows/compile-latex.yml'
  pull_request:
    branches: [main]
    paths:
      - 'curriculum_vitae/**/*.tex'
      - 'curriculum_vitae/**/*.cls'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile SWE Resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: curriculum_vitae/swe
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile Quant Resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: curriculum_vitae/quant
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile IB Resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: curriculum_vitae/ib-sales-consulting
          compiler: xelatex
          args: -file-line-error -halt-on-error -interaction=nonstopmode

      - name: List compiled PDFs
        run: |
          ls -lh curriculum_vitae/swe/*.pdf || true
          ls -lh curriculum_vitae/quant/*.pdf || true
          ls -lh curriculum_vitae/ib-sales-consulting/*.pdf || true

      # --- Optional: Deploy to a public CV repo ---
